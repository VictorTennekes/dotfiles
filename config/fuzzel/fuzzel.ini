# fuzzel — Niri rice launcher. LAYOUT/STRUCTURE only.
# Colors live in the theme: theme-switch stamps the [colors] + [border]
# blocks between the THEME:colors markers (from
# config/theme/current/fuzzel.ini). Switch themes with `theme-switch <name>`.
[main]
font=Inter:size=13
use-bold=yes
prompt=""
placeholder=Search apps and commands…
icon-theme=Adwaita
icons-enabled=yes
fields=name,generic,comment
terminal=ghostty -e
width=38
lines=8
horizontal-pad=26
vertical-pad=22
inner-pad=16
line-height=28
layer=overlay

# THEME:colors:start
[colors]
background=1e1e2eee
text=cdd6f4ff
prompt=89b4faff
input=cdd6f4ff
match=89b4faff
selection=313244ff
selection-text=cdd6f4ff
selection-match=89b4faff
border=89b4faff

[border]
width=2
radius=12
# THEME:colors:end
