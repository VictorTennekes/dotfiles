# Catppuccin Mocha — fuzzel colors.
# fuzzel.ini has no includes, so theme-switch stamps this [colors] +
# [border] block into ~/.config/fuzzel/fuzzel.ini between the
# THEME:colors markers. Only colors/border live here.
[colors]
background=1e1e2eee
text=cdd6f4ff
prompt=89b4faff
input=cdd6f4ff
match=89b4faff
selection=313244ff
selection-text=cdd6f4ff
selection-match=89b4faff
border=89b4faff

[border]
width=2
radius=12
