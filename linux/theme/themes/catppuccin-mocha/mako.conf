# Catppuccin Mocha — mako colors.
# mako config has no includes, so theme-switch stamps these color keys
# into ~/.config/mako/config between the THEME:colors markers.
# Only colors live here; layout/timeout/etc. stay in mako/config.
background-color=#1e1e2eee
text-color=#cdd6f4
border-color=#89b4fa
progress-color=over #313244
