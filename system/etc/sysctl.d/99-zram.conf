# zram swap tuning. swappiness=180 is correct *because* swap is compressed RAM
# (cheap), not disk — it would be wrong on a disk-swap system. page-cluster=0
# disables swap readahead (pointless for RAM). watermark tuning keeps the kernel
# reclaiming smoothly under pressure. Paired with system/etc/systemd/zram-generator.conf.
vm.swappiness = 180
vm.watermark_boost_factor = 0
vm.watermark_scale_factor = 125
vm.page-cluster = 0
