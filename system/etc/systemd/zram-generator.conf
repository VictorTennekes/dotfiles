# zram swap (compressed RAM) via systemd zram-generator. No disk swap exists;
# with 32 GB RAM this is a safety net, not a perf need. Tuning in
# system/etc/sysctl.d/99-zram.conf. Activates at boot; to bring up without a
# reboot: systemctl start dev-zram0.swap (NOT systemd-zram-setup@zram0, which
# formats but does not swapon).
[zram0]
zram-size = min(ram / 2, 8192)
compression-algorithm = zstd
