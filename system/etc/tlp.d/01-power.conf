# Framework 13 AMD (amd-pstate-epp) power profile.
# Synced to /etc/tlp.d/01-power.conf by scripts/install-arch (system overrides).
# Full performance on AC; balanced on battery. TLP switches automatically on
# power-source change. Enable once: systemctl enable --now tlp.service
#
# Tune toward more savings on battery: set GOVERNOR=powersave (already),
# ENERGY_PERF_POLICY_ON_BAT=power, PLATFORM_PROFILE_ON_BAT=low-power, BOOST_ON_BAT=0.

# Keep amd-pstate in active (EPP) mode on both.
CPU_DRIVER_OPMODE_ON_AC=active
CPU_DRIVER_OPMODE_ON_BAT=active

# AC = full performance; battery = scale down.
CPU_SCALING_GOVERNOR_ON_AC=performance
CPU_SCALING_GOVERNOR_ON_BAT=powersave

# Energy/performance hint (EPP) for amd-pstate.
CPU_ENERGY_PERF_POLICY_ON_AC=performance
CPU_ENERGY_PERF_POLICY_ON_BAT=balance_power

# ACPI platform profile (low-power / balanced / performance).
PLATFORM_PROFILE_ON_AC=performance
PLATFORM_PROFILE_ON_BAT=balanced

# Turbo boost: on for AC; keep on for battery responsiveness (powersave
# governor still limits draw). Set to 0 for max battery savings.
CPU_BOOST_ON_AC=1
CPU_BOOST_ON_BAT=1

# Battery-side device power saving.
PCIE_ASPM_ON_BAT=powersupersave
RUNTIME_PM_ON_BAT=auto
WIFI_PWR_ON_BAT=on
